---
- name: Setup Docker and Kubernetes environment
  hosts: all
  become: yes
  
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
    
    - name: Install Docker
      apt:
        name: docker.io
        state: present
    
    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes
    
    - name: Install kubectl
      snap:
        name: kubectl
        classic: yes
    
    - name: Install minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'
    
    - name: Install Python pip
      apt:
        name: python3-pip
        state: present
    
    - name: Install Docker SDK for Python
      pip:
        name: docker
        state: present
