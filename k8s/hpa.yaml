apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: firewall-app-hpa
  labels:
    app: firewall-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: firewall-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
